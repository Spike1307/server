name: Security Checks

on: [push, pull_request]

jobs:
  scan-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan source code with Semgrep
        run: |
          pip3 install semgrep
          semgrep --config .semgrep.yml --config auto --error src/main/java/

  scan-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tileserver:latest .

      - name: Scan Docker image with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/refs/tags/v0.69.3/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3
          trivy image --severity HIGH,CRITICAL --exit-code 1 tileserver
