<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuestShaper Game</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <!--link rel="icon" href="QuestShaper.jpg" /-->
  </head>
  <body onload="startGame()">

    <div id="questshaper">
      <canvas id="canvas" width="704" height="704" tabindex="0" focus="true"></canvas>
      <div id="info">
        Name: <input id="name" size="20" value="" tabindex="1" />
        Password / digest: <input id="password" type="password" size="20" value="" tabindex="2" />
        <br/><br/>
        Server: <input id="server" size="30" value="" placeholder="http://15.134.49.143" tabindex="3" />
        <button id="begin" tabindex="4">Begin Questing</button>
      </div>
    </div>
    <script type="text/javascript" src="script.js"></script>
  </body>
</html>
